<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexdigestGlobal | Strategic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --faz-red: #8c0303; --paper-white: #fcfcfc; }
        body { background-color: var(--paper-white); color: #1a1a1a; font-family: 'Lora', serif; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .sans { font-family: 'Inter', sans-serif; }
        .header-border { border-top: 4px solid #000; border-bottom: 1px solid #000; }
        .btn-black { background: #1a1a1a; color: white; font-family: 'Inter', sans-serif; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; padding: 0.8rem 1.5rem; transition: 0.3s; cursor: pointer; border: none; }
        .btn-black:hover { background: var(--faz-red); }
        .advisory-tile { border: 1px solid #e5e5e5; transition: all 0.4s ease; cursor: pointer; height: 260px; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; background: #fff; }
        .advisory-tile:hover { border-color: black; transform: translateY(-3px); }
        .advisory-tile h3 { font-size: 1.5rem; transition: color 0.3s; }
        .advisory-tile:hover h3 { color: var(--faz-red); }
        .article-card { border-bottom: 1px solid #eee; padding-bottom: 2rem; margin-bottom: 2rem; transition: opacity 0.2s; cursor: pointer; }
        .article-card:hover { opacity: 0.8; }
        .is-admin .admin-panel { display: block; }
        .admin-panel { display: none; background: #fff1f1; border: 2px solid #8c0303; padding: 20px; margin-bottom: 40px; }
        .hidden { display: none; }
        #login-modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="px-4 md:px-10">

    <div class="max-w-7xl mx-auto py-3 flex justify-between items-center border-b border-gray-100 sans text-[10px] font-bold uppercase tracking-widest">
        <button onclick="openLoginModal()" class="hover:text-red-800">Editor Login</button>
        <p>LexdigestGlobal • Strategic Intelligence</p>
        <p id="nav-date"></p>
    </div>

    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-white p-10 max-w-sm w-full border-t-8 border-black shadow-2xl">
            <h2 class="text-3xl font-bold mb-6 italic text-center">Lexdigest Editor</h2>
            <input type="email" id="email-field" placeholder="E-Mail" class="w-full p-3 border mb-4 sans text-sm outline-none focus:border-black">
            <input type="password" id="pass-field" placeholder="Password" class="w-full p-3 border mb-8 sans text-sm outline-none focus:border-black">
            <button onclick="attemptLogin()" class="w-full bg-black text-white py-4 sans font-bold uppercase text-xs tracking-widest">Sign In</button>
            <button onclick="closeLoginModal()" class="w-full mt-4 text-[9px] uppercase sans text-gray-400 font-bold">Cancel</button>
        </div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-8 pt-10">
        <h1 class="text-7xl md:text-9xl font-bold italic tracking-tighter mb-6 cursor-pointer" onclick="renderHome()">LexdigestGlobal</h1>
        <nav class="header-border py-4 flex justify-center space-x-6 md:space-x-12 text-[11px] md:text-sm sans font-bold uppercase tracking-tight">
            <a href="javascript:void(0)" onclick="renderHome()" class="hover:text-red-900 transition">Journals</a>
            <a href="javascript:void(0)" onclick="renderAdvisoryHub()" class="hover:text-red-900 transition">Strategic Advisory</a>
            <a href="javascript:void(0)" onclick="renderContact()" class="hover:text-red-900 transition">Contact</a>
            <a href="javascript:void(0)" onclick="renderImpressum()" class="hover:text-red-900 transition">Impressum</a>
        </nav>
    </header>

    <div id="admin-tools" class="max-w-7xl mx-auto admin-panel">
        <h3 class="sans text-xs font-bold text-red-800 uppercase mb-4 tracking-widest">Admin: New Entry</h3>
        <input type="text" id="new-art-title" placeholder="Title" class="w-full p-3 border mb-2 sans text-sm outline-none focus:border-red-800">
        <textarea id="new-art-body" placeholder="Content..." class="w-full p-3 border mb-4 h-32 sans text-sm outline-none focus:border-red-800"></textarea>
        <button onclick="createNewArticle()" class="btn-black text-xs">Publish (Session)</button>
    </div>

    <main id="view-container" class="max-w-7xl mx-auto pb-32">
        </main>

    <footer class="max-w-7xl mx-auto border-t-4 border-black mt-20 py-12 text-center sans text-[10px] uppercase tracking-[0.5em] text-zinc-400">
        © 2026 LexdigestGlobal Intelligence • Theo G. • Vienna
    </footer>

    <script>
        // Data Handling
        let articles = JSON.parse(localStorage.getItem('lex_articles')) || [
            { id: 1, cat: "GEOPOLITICS", title: "The Geopolitics of Capital", sub: "Global Shift 2026", body: "The current shift in global trade corridors necessitates a fundamental rethink of industrial policy...", img: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1200" }
        ];
        let loggedIn = false;

        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }

        function attemptLogin() {
            const email = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            if(email === "glunz.theo@gmail.com" && pass === "wochen34") {
                loggedIn = true; 
                document.body.classList.add('is-admin'); 
                closeLoginModal(); 
                renderHome();
            } else { alert("Login failed."); }
        }

        function renderHome() {
            const container = document.getElementById('view-container');
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-12 pt-10">`;
            articles.forEach(art => {
                html += `
                <div class="article-card" onclick="viewArticle(${art.id})">
                    <img src="${art.img}" class="w-full h-64 object-cover mb-4 grayscale hover:grayscale-0 transition duration-500">
                    <h3 class="text-3xl font-bold">${art.title}</h3>
                    <p class="text-gray-500 mt-2 italic">Read Report →</p>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function viewArticle(id) {
            const art = articles.find(a => a.id === id);
            document.getElementById('view-container').innerHTML = `
                <div class="max-w-3xl mx-auto py-10">
                    <button onclick="renderHome()" class="sans text-[10px] font-bold uppercase mb-8 border-b border-black">← Back to Journals</button>
                    <h2 class="text-5xl font-bold mb-8 italic leading-tight">${art.title}</h2>
                    <div class="text-xl leading-relaxed whitespace-pre-wrap">${art.body}</div>
                </div>`;
            window.scrollTo(0,0);
        }

        function renderAdvisoryHub() {
            const container = document.getElementById('view-container');
            const advisors = [
                { title: 'Global Funding', desc: 'Sovereign Wealth', icon: '€' },
                { title: 'Relocation', desc: 'Market Entry', icon: '↗' },
                { title: 'SME Tool', desc: 'Funnel Path', icon: '⚡' }
            ];
            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-10">`;
            advisors.forEach(ad => {
                html += `<div class="advisory-tile" onclick="renderHome()">
                    <span class="text-3xl opacity-20 mb-4">${ad.icon}</span>
                    <p class="sans text-[9px] font-bold uppercase text-gray-400 mb-1">${ad.desc}</p>
                    <h3>${ad.title}</h3>
                </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function renderContact() {
            document.getElementById('view-container').innerHTML = `
                <div class="max-w-xl mx-auto py-10 text-center">
                    <h2 class="text-4xl font-bold mb-8 italic">Contact</h2>
                    <form class="space-y-4" onsubmit="event.preventDefault(); alert('Briefing Request Sent.');">
                        <input type="text" placeholder="Name" class="w-full p-4 border bg-white outline-none focus:border-black">
                        <textarea placeholder="Enquiry" class="w-full p-4 border bg-white outline-none focus:border-black h-40"></textarea>
                        <button class="btn-black w-full">Send Message</button>
                    </form>
                </div>`;
        }

        function renderImpressum() {
            document.getElementById('view-container').innerHTML = `<div class="max-w-xl mx-auto py-20 text-center"><h2 class="text-3xl font-bold mb-6 italic italic">Impressum</h2><p>Theo G. • Vienna, Austria<br>Journalistic Briefings<br>§25 Media Act Compliant</p></div>`;
        }

        function createNewArticle() {
            const title = document.getElementById('new-art-title').value;
            const body = document.getElementById('new-art-body').value;
            if(!title || !body) return alert("Please fill all fields.");
            articles.unshift({ id: Date.now(), title, body, img: "https://images.unsplash.com/photo-1454165833767-0266b1497b33?q=80&w=800" });
            localStorage.setItem('lex_articles', JSON.stringify(articles));
            renderHome();
        }

        document.getElementById('nav-date').innerText = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        renderHome();
    </script>
</body>
</html>
